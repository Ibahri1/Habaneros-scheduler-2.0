<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; connect-src https://*.supabase.co; object-src 'none'; base-uri 'none'; form-action 'self'">
  <title>Habaneros Availability</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <header>
      <p>Habaneros Mexican Grill</p>
      <div class="language-toggle" aria-label="Language">
        <button id="languageEnglish" type="button" data-language="en">English</button>
        <button id="languageSpanish" type="button" data-language="es">Español</button>
      </div>
      <h1 data-i18n="title">Employee Availability</h1>
      <nav class="site-tabs" aria-label="Employee website sections">
        <button id="availabilityTab" class="active" type="button" data-i18n="availabilityTab">Submit Availability</button>
        <button id="scheduleTab" type="button" data-i18n="scheduleTab">View Schedule</button>
      </nav>
    </header>
    <section id="loginPanel" data-availability-section>
      <form id="codeForm">
        <label for="employeeCode" data-i18n="employeeCode">Employee Code</label>
        <input id="employeeCode" type="password" inputmode="numeric" pattern="\d{4}" maxlength="4" autocomplete="one-time-code" required>
        <p class="hint" data-i18n="employeeCodeHint">Enter your 4-digit employee code</p>
        <button type="submit" data-i18n="continue">Continue</button>
      </form>
    </section>
    <section id="availabilityPanel" data-availability-section hidden>
      <div class="welcome"><span data-i18n="welcome">Welcome</span>, <strong id="employeeName"></strong></div>
      <form id="availabilityForm">
        <label for="weekStart" data-i18n="weekOf">Week of</label>
        <select id="weekStart" required></select>
        <fieldset><legend data-i18n="daysAvailable">Days you are available</legend><div id="days" class="days"></div></fieldset>
        <button type="submit" data-i18n="submitAvailability">Submit Availability</button>
        <button id="startOver" class="secondary" type="button" data-i18n="useDifferentCode">Use a different code</button>
      </form>
    </section>
    <section id="successPanel" class="success-panel" data-availability-section hidden>
      <div class="success-check" aria-hidden="true">&#10003;</div>
      <h2 data-i18n="successTitle">Availability Submitted Successfully</h2>
      <p data-i18n="successReceived">Your lead has received your availability for:</p>
      <strong id="successWeek"></strong>
      <p data-i18n="thankYou">Thank you.</p>
      <button id="submitAnother" type="button" data-i18n="submitAnother">Submit Another Week</button>
    </section>
    <section id="schedulePanel" hidden>
      <label for="scheduleWeek" data-i18n="scheduleWeek">Schedule week</label>
      <select id="scheduleWeek"></select>
      <div id="postedSchedule" class="posted-schedule"></div>
    </section>
    <div id="message" role="status" aria-live="polite"></div>
  </main>
  <script src="config.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
